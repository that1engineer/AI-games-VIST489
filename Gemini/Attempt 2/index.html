<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrap-Iron Survivors - Phase 2</title>
    <style>
        body {
            margin: 0; background-color: #111; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; user-select: none;
        }
        #game-container {
            position: relative; width: 800px; height: 600px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        canvas { display: block; background-color: #222; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .overlay.active { display: flex; }
        h1 { color: #0ff; text-shadow: 0 0 10px #0ff; margin-bottom: 10px; }
        button {
            background: #222; border: 2px solid #0ff; color: #0ff;
            padding: 15px 30px; margin: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        button:hover { background: #0ff; color: #000; }
        .card-container { display: flex; gap: 20px; }
        .card {
            background: #333; border: 2px solid #0f0; color: #fff;
            padding: 20px; width: 150px; text-align: center;
            cursor: pointer; border-radius: 8px;
        }
        .card:hover { background: #0f0; color: #000; }
        #ui-layer {
            position: absolute; top: 10px; left: 10px; right: 10px; pointer-events: none;
        }
        .bar-bg { background: #555; width: 100%; height: 15px; border-radius: 5px; margin-bottom: 5px;}
        #xp-bar { background: #0ff; width: 0%; height: 100%; transition: width 0.2s; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui-layer">
        <div class="bar-bg"><div id="xp-bar"></div></div>
        <div class="stats">
            <span id="ui-level">Level: 1</span>
            <span id="ui-time">00:00</span>
            <span id="ui-kills">Kills: 0</span>
        </div>
    </div>

    <div id="menu-start" class="overlay active">
        <h1>Scrap-Iron Survivors</h1>
        <p>Phase 2: Data-Driven Architecture</p>
        <button onclick="startGame('char_jax')">PLAY AS JAX</button>
        <button onclick="startGame('char_nova')">PLAY AS NOVA</button>
    </div>

    <div id="menu-levelup" class="overlay">
        <h1>SYSTEM UPGRADE</h1>
        <div class="card-container" id="upgrade-cards"></div>
    </div>

    <div id="menu-gameover" class="overlay">
        <h1 style="color: #f00; text-shadow: 0 0 10px #f00;">SYSTEM FAILURE</h1>
        <p id="final-stats"></p>
        <button onclick="location.reload()">REBOOT</button>
    </div>
</div>

<script>
// ==========================================
// DESIGNER DATA BLOCK (Swap values here!)
// ==========================================
const GAME_DATA = {
    classes: {
        char_jax: { name: "Jax", hp: 100, spd: 180, starting_ability: "wpn_blaster", color: "#0ff" },
        char_nova: { name: "Nova", hp: 80, spd: 160, starting_ability: "wpn_mortar", color: "#f90" }
    },
    enemies: {
        en_scrapling: { name: "Scrapling", hp: 10, atk: 10, spd: 40, xp: 1, color: "#f00", size: 12 },
        en_hound: { name: "Chrome-Hound", hp: 35, atk: 15, spd: 90, xp: 3, color: "#f0f", size: 8 }
    },
    abilities: {
        wpn_blaster: { name: "Auto-Blaster", type: "auto", cooldown: 0.8, power: 15, range: 400, projSpeed: 400, color: "#0ff" },
        wpn_mortar: { name: "Frag Mortar", type: "aoe", cooldown: 2.5, power: 25, range: 300, radius: 60, color: "#f90" },
        wpn_plasma: { name: "Plasma Ring", type: "aura", cooldown: 3.0, power: 10, radius: 100, duration: 0.5, color: "#0f0" }
    },
    items: {
        art_boots: { name: "Kinetic Boots", stat: "spd", val: 0.1, desc: "+10% Move Speed" },
        art_multitool: { name: "Multitool", stat: "proj", val: 1, desc: "+1 Projectile" },
        art_amplifier: { name: "Amplifier", stat: "dmg", val: 0.2, desc: "+20% Damage" }
    }
};

// ==========================================
// GAME ENGINE LOGIC
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const keys = {};

let gameState = 'MENU'; 
let lastTime = 0, gameTime = 0, kills = 0;

let player = { x: 400, y: 300, size: 16, level: 1, xp: 0, xpNeeded: 10, stats: { dmg: 1, proj: 1, spd: 1 }, activeAbilities: [] };
let enemies = [], bullets = [], pickups = [], damageTexts = [];

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function startGame(classId) {
    const charData = GAME_DATA.classes[classId];
    player.maxHp = player.hp = charData.hp;
    player.baseSpd = charData.spd;
    player.color = charData.color;
    
    // Grant starting ability
    grantAbility(charData.starting_ability);

    document.getElementById('menu-start').classList.remove('active');
    gameState = 'PLAYING';
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

function grantAbility(id) {
    const abData = GAME_DATA.abilities[id];
    player.activeAbilities.push({ ...abData, timer: 0, level: 1 });
}

function spawnEnemy(minutes) {
    const hpMult = 1 + (0.15 * minutes) + (0.05 * minutes * minutes);
    const typeId = Math.random() > 0.8 ? 'en_hound' : 'en_scrapling';
    const data = GAME_DATA.enemies[typeId];
    
    const angle = Math.random() * Math.PI * 2;
    enemies.push({
        x: player.x + Math.cos(angle) * 500, y: player.y + Math.sin(angle) * 500,
        ...data, hp: data.hp * hpMult, maxHp: data.hp * hpMult
    });
}

function fireAbilities(dt) {
    player.activeAbilities.forEach(ab => {
        ab.timer -= dt;
        if (ab.timer <= 0) {
            if (ab.type === "auto") {
                // Find closest
                let target = null, minDist = Infinity;
                enemies.forEach(e => {
                    const dist = Math.hypot(player.x - e.x, player.y - e.y);
                    if (dist < minDist && dist < ab.range) { minDist = dist; target = e; }
                });
                
                if (target) {
                    const angle = Math.atan2(target.y - player.y, target.x - player.x);
                    bullets.push({
                        type: 'proj', x: player.x, y: player.y, size: 4, life: 2.0,
                        vx: Math.cos(angle) * ab.projSpeed, vy: Math.sin(angle) * ab.projSpeed,
                        damage: ab.power * player.stats.dmg, color: ab.color
                    });
                }
            } else if (ab.type === "aoe") {
                // Random spot near player
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * ab.range;
                bullets.push({
                    type: 'blast', x: player.x + Math.cos(angle) * dist, y: player.y + Math.sin(angle) * dist,
                    radius: ab.radius, life: 0.2, maxLife: 0.2, damage: ab.power * player.stats.dmg, color: ab.color
                });
            } else if (ab.type === "aura") {
                bullets.push({
                    type: 'aura', x: player.x, y: player.y, maxRadius: ab.radius,
                    life: ab.duration, maxLife: ab.duration, damage: ab.power * player.stats.dmg, color: ab.color
                });
            }
            ab.timer = ab.cooldown;
        }
    });
}

function update(dt) {
    gameTime += dt;
    const mins = gameTime / 60;

    // Player Move
    let dx = 0, dy = 0;
    if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
    
    if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy);
        player.x += (dx / len) * (player.baseSpd * player.stats.spd) * dt;
        player.y += (dy / len) * (player.baseSpd * player.stats.spd) * dt;
    }
    player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

    // Spawn & Fire
    if (enemies.length < 30 + (15 * mins) && Math.random() < 0.1) spawnEnemy(mins);
    fireAbilities(dt);

    // Bullet Physics & Collision
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.life -= dt;
        if (b.life <= 0) { bullets.splice(i, 1); continue; }

        if (b.type === 'proj') {
            b.x += b.vx * dt; b.y += b.vy * dt;
            let hit = false;
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + b.size) {
                    e.hp -= b.damage; hit = true;
                    damageTexts.push({ x: e.x, y: e.y, text: Math.floor(b.damage), life: 0.5 });
                    break;
                }
            }
            if (hit) bullets.splice(i, 1);
        } else if (b.type === 'blast' || b.type === 'aura') {
            if (b.type === 'aura') { b.x = player.x; b.y = player.y; }
            const currentRadius = b.type === 'aura' ? (1 - (b.life / b.maxLife)) * b.maxRadius : b.radius;
            
            enemies.forEach(e => {
                if (Math.hypot(b.x - e.x, b.y - e.y) < currentRadius + e.size) {
                    if (!e.hitBy) e.hitBy = [];
                    if (!e.hitBy.includes(b)) {
                        e.hp -= b.damage; e.hitBy.push(b);
                        damageTexts.push({ x: e.x, y: e.y, text: Math.floor(b.damage), life: 0.5 });
                    }
                }
            });
        }
    }

    // Enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (e.hp <= 0) {
            pickups.push({ x: e.x, y: e.y, val: e.xp });
            enemies.splice(i, 1); kills++; continue;
        }
        const dist = Math.hypot(player.x - e.x, player.y - e.y);
        e.x += ((player.x - e.x) / dist) * e.spd * dt;
        e.y += ((player.y - e.y) / dist) * e.spd * dt;

        if (dist < player.size + e.size) {
            player.hp -= e.atk * dt;
            if (player.hp <= 0) {
                gameState = 'GAMEOVER';
                document.getElementById('final-stats').innerText = `Survived: ${Math.floor(mins)}m ${Math.floor(gameTime%60)}s | Kills: ${kills}`;
                document.getElementById('menu-gameover').classList.add('active');
            }
        }
    }

    // Pickups
    for (let i = pickups.length - 1; i >= 0; i--) {
        const p = pickups[i];
        const dist = Math.hypot(player.x - p.x, player.y - p.y);
        if (dist < 80) { // Magnet
            p.x += (player.x - p.x) * 5 * dt; p.y += (player.y - p.y) * 5 * dt;
            if (dist < player.size + 5) {
                player.xp += p.val; pickups.splice(i, 1);
                if (player.xp >= player.xpNeeded) levelUp();
            }
        }
    }

    // Cleanup text
    for (let i = damageTexts.length - 1; i >= 0; i--) {
        damageTexts[i].life -= dt; damageTexts[i].y -= 20 * dt;
        if (damageTexts[i].life <= 0) damageTexts.splice(i, 1);
    }

    // Update UI
    document.getElementById('ui-level').innerText = `Level: ${player.level}`;
    document.getElementById('ui-time').innerText = `${Math.floor(mins).toString().padStart(2, '0')}:${Math.floor(gameTime%60).toString().padStart(2, '0')}`;
    document.getElementById('ui-kills').innerText = `Kills: ${kills}`;
    document.getElementById('xp-bar').style.width = `${(player.xp / player.xpNeeded) * 100}%`;
}

function levelUp() {
    player.xp -= player.xpNeeded;
    player.level++;
    player.xpNeeded = Math.floor(player.xpNeeded * 1.5);
    
    gameState = 'LEVELUP';
    const menu = document.getElementById('menu-levelup');
    const container = document.getElementById('upgrade-cards');
    container.innerHTML = '';
    menu.classList.add('active');

    // Generate 3 random cards from items + missing abilities
    const options = [
        { title: "Unlock Plasma", desc: "Periodic Area of Effect", action: () => grantAbility('wpn_plasma') },
        { title: GAME_DATA.items.art_boots.name, desc: GAME_DATA.items.art_boots.desc, action: () => player.stats.spd += GAME_DATA.items.art_boots.val },
        { title: GAME_DATA.items.art_amplifier.name, desc: GAME_DATA.items.art_amplifier.desc, action: () => player.stats.dmg += GAME_DATA.items.art_amplifier.val }
    ];

    options.forEach(upg => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${upg.title}</h3><p>${upg.desc}</p>`;
        card.onclick = () => {
            upg.action();
            menu.classList.remove('active');
            gameState = 'PLAYING';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        };
        container.appendChild(card);
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Grid
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    for(let i = 0; i < canvas.width; i+=50) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    // Pickups
    ctx.fillStyle = '#0f0';
    pickups.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill(); });

    // Enemies
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'red'; ctx.fillRect(e.x - 10, e.y - e.size - 6, 20, 3);
        ctx.fillStyle = 'lime'; ctx.fillRect(e.x - 10, e.y - e.size - 6, 20 * (e.hp / e.maxHp), 3);
    });

    // Bullets
    bullets.forEach(b => {
        if (b.type === 'aura' || b.type === 'blast') {
            ctx.strokeStyle = b.color; ctx.lineWidth = b.type === 'blast' ? 5 : 3;
            ctx.globalAlpha = b.life / b.maxLife;
            const r = b.type === 'aura' ? (1 - (b.life / b.maxLife)) * b.maxRadius : b.radius;
            ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI*2); ctx.stroke();
            ctx.globalAlpha = 1.0;
        } else {
            ctx.fillStyle = b.color;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.fill();
        }
    });

    // Player
    ctx.fillStyle = player.color;
    ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'red'; ctx.fillRect(player.x - 15, player.y + 20, 30, 4);
    ctx.fillStyle = 'lime'; ctx.fillRect(player.x - 15, player.y + 20, 30 * Math.max(0, player.hp / player.maxHp), 4);

    // Text
    ctx.fillStyle = '#fff'; ctx.font = '12px Courier New';
    damageTexts.forEach(t => {
        ctx.globalAlpha = t.life / 0.5;
        ctx.fillText(t.text, t.x, t.y);
    });
    ctx.globalAlpha = 1.0;
}

function gameLoop(timestamp) {
    if (gameState !== 'PLAYING') return;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.1); // Cap delta time
    lastTime = timestamp;
    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
