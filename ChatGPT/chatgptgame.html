<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moonwake Swarm Phase 2 Designer Tool</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111018;
        --panel: #1d1927;
        --panel-2: #262034;
        --line: rgba(255, 255, 255, 0.14);
        --text: #f5f0f8;
        --muted: #beb4ca;
        --good: #7ed7c1;
        --warn: #f5d67b;
        --bad: #e86f68;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        padding: 18px clamp(14px, 3vw, 32px);
        border-bottom: 1px solid var(--line);
        background: #171420;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      main {
        display: grid;
        grid-template-columns: 260px 1fr;
        min-height: calc(100vh - 82px);
      }

      nav {
        padding: 14px;
        border-right: 1px solid var(--line);
        background: #15121d;
      }

      button {
        width: 100%;
        min-height: 38px;
        margin-bottom: 8px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        text-align: left;
        font-weight: 700;
        cursor: pointer;
      }

      button.active,
      button:hover {
        border-color: var(--warn);
      }

      .content {
        padding: 16px clamp(14px, 3vw, 32px) 32px;
        overflow: auto;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .search {
        min-width: min(420px, 100%);
        height: 38px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
      }

      .card {
        min-height: 160px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .card-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        background: var(--panel-2);
        border-bottom: 1px solid var(--line);
      }

      .thumb {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #111018;
        color: var(--warn);
        font-size: 10px;
        text-align: center;
      }

      .card h2 {
        margin: 0;
        font-size: 16px;
      }

      .card small {
        color: var(--muted);
      }

      dl {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 6px 10px;
        margin: 0;
        padding: 12px;
        font-size: 13px;
      }

      dt {
        color: var(--muted);
      }

      dd {
        margin: 0;
        overflow-wrap: anywhere;
      }

      .status {
        display: grid;
        gap: 8px;
      }

      .game-wrap {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 14px;
        align-items: start;
      }

      .game-stage {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0f0d15;
      }

      #phase2Game {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        image-rendering: pixelated;
      }

      .game-hud {
        position: absolute;
        inset: 10px 10px auto;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        pointer-events: none;
      }

      .pill {
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(17, 16, 24, 0.78);
        font-size: 12px;
      }

      .side-panel {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .side-panel h3 {
        margin: 0;
        font-size: 16px;
      }

      .side-panel p {
        font-size: 13px;
      }

      .side-panel button {
        margin: 0;
        text-align: center;
      }

      .check {
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .pass {
        color: var(--good);
      }

      .fail {
        color: var(--bad);
      }

      pre {
        overflow: auto;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0c0b11;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }

        nav {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .game-wrap {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

      const parseCSV = (text) => {
        const lines = text.trim().split(/\r?\n/);
        const headers = lines.shift().split(",");
        return lines.map((line) => {
          const cells = line.split(",");
          return Object.fromEntries(headers.map((header, i) => [header, cells[i] ?? ""]));
        });
      };

            for (const [key, value] of Object.entries(row)) {
              if (key.startsWith("image_") && value !== "MISSING_IMAGE" && !imageMap[value]) {
                brokenImages.push(`${file}:${row.id}:${key}:${value}`);
              }
            }
          }
        }
        checks.push({ name: "All image fields reference image_map.json or MISSING_IMAGE", pass: brokenImages.length === 0, broken: brokenImages });

        const duplicateIds = [];
        for (const [file, rows] of Object.entries(data)) {
          const seen = new Set();
          for (const row of rows) {
            if (seen.has(row.id)) duplicateIds.push(`${file}:${row.id}`);
            seen.add(row.id);
          }
        }
        checks.push({ name: "No duplicate id values within a CSV", pass: duplicateIds.length === 0, broken: duplicateIds });

        const abilityIds = new Set(data.abilities.map((row) => row.id));
        const brokenAbilities = [];
        for (const row of data.player_classes) {
          for (const id of row.starting_abilities.split(";").filter(Boolean)) {
            if (!abilityIds.has(id)) brokenAbilities.push(`player_classes:${row.id}:${id}`);
          }
        }
        checks.push({ name: "All ability ids referenced by classes/items exist in abilities.csv", pass: brokenAbilities.length === 0, broken: brokenAbilities });

        const itemIds = new Set(data.items.map((row) => row.id));
        const brokenLoot = [];
        for (const row of data.enemy_types) {
          for (const id of row.loot_table.split(";").filter(Boolean)) {
            if (!itemIds.has(id)) brokenLoot.push(`enemy_types:${row.id}:${id}`);
          }
        }
        checks.push({ name: "All loot item ids exist in items.csv", pass: brokenLoot.length === 0, broken: brokenLoot });
        return checks;
      }

      function imageFor(row) {
        return row.image_icon || row.image_sprite || row.image_portrait || "MISSING_IMAGE";
      }

      function renderCards(rows) {
        const q = document.querySelector("#search").value.trim().toLowerCase();
        const filtered = rows.filter((row) => JSON.stringify(row).toLowerCase().includes(q));
        document.querySelector("#output").innerHTML = `<div class="cards">${filtered.map((row) => {
          const image = imageFor(row);
          return `<article class="card">
            <div class="card-head">
              <div class="thumb">${image === "MISSING_IMAGE" ? "MISSING" : "IMG"}</div>
              <div><h2>${row.name || row.id}</h2><small>${row.id}</small></div>
            </div>
            <dl>${Object.entries(row).map(([key, value]) => `<dt>${key}</dt><dd>${value}</dd>`).join("")}</dl>
          </article>`;
        }).join("")}</div>`;
      }

      function renderChecklist() {
        const checks = validate();
        document.querySelector("#output").innerHTML = `<div class="status">${checks.map((check) => `
          <div class="check">
            <strong class="${check.pass ? "pass" : "fail"}">${check.pass ? "PASS" : "FAIL"}</strong>
            ${check.name}
            ${check.broken.length ? `<pre>${check.broken.join("\n")}</pre>` : ""}
          </div>
        `).join("")}</div>`;
      }

      function renderGuide() {
        document.querySelector("#output").innerHTML = `
          <div class="check">
            <ul>
              <li>Tune enemy hp to change time-to-kill before changing spawn density.</li>
              <li>Tune enemy atk only after survivability feels readable and fair.</li>
              <li>Tune ability cooldown for feel and ability power for DPS targets.</li>
              <li>Use xp_reward to control level pace without touching combat math.</li>
              <li>Keep player class base_spd changes small because movement strongly affects difficulty.</li>
            </ul>
            <p>Update a stat in the relevant CSV, then open Checklist. For image swaps, update the filename and add the same key to image_map.json.</p>
          </div>`;
      }

      function renderPlay() {
        document.querySelector("#output").innerHTML = `
          <div class="game-wrap">
            <div class="game-stage">
              <canvas id="phase2Game" width="960" height="540" aria-label="Playable Phase 2 game"></canvas>
              <div class="game-hud">
                <span class="pill" id="gameHp">HP</span>
                <span class="pill" id="gameTimer">00:00</span>
                <span class="pill" id="gameStats">Lv 1</span>
              </div>
            </div>
            <aside class="side-panel">
              <h3>Phase 2 Playable Build</h3>
              <p>This build uses the embedded Phase 2 class, enemy, ability, and item data. Move with WASD or arrow keys. Attacks auto-fire.</p>
              <button id="restartGame">Restart Run</button>
              <p id="gameLog">Mira Ashwake starts with Ember Needle.</p>
            </aside>
          </div>`;
        startGame();
      }

      function startGame() {
        const canvas = document.querySelector("#phase2Game");
        const ctx = canvas.getContext("2d");
        const hero = data.player_classes[0];
        const abilityById = Object.fromEntries(data.abilities.map((a) => [a.id, a]));
        const enemyPool = data.enemy_types.filter((e) => e.id !== "enemy_bell_ghast");
        const bossDef = data.enemy_types.find((e) => e.id === "enemy_bell_ghast");
        const keys = {};
        let seed = 260426;
        const rand = () => ((seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296);
        const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
        const distance = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
        const state = {
          time: 0,
          last: 0,
          kills: 0,
          paused: false,
          over: false,
          spawnBank: 0,
          player: {
            x: 480,
            y: 270,
            r: 14,
            hp: Number(hero.base_hp),
            maxHp: Number(hero.base_hp),
            spd: Number(hero.base_spd),
            level: 1,
            xp: 0,
            xpNeed: 12,
            damageMult: 1,
            pickupRadius: 32
          },
          weapons: [{ id: hero.starting_abilities, cd: 0, level: 1 }],
          enemies: [],
          bullets: [],
          pickups: [],
          pulse: 0
        };

        function resizeCanvas() {
          const rect = canvas.getBoundingClientRect();
          canvas.width = Math.max(320, Math.floor(rect.width));
          canvas.height = Math.max(180, Math.floor(rect.width * 9 / 16));
        }

        function enemyScale(row, boss = false) {
          const m = state.time / 60;
          const hp = boss ? Number(row.hp) : Math.round(Number(row.hp) * (1 + 0.22 * m));
          return {
            id: row.id,
            name: row.name,
            x: 0,
            y: 0,
            r: boss ? 34 : row.id.includes("bat") ? 10 : row.id.includes("slug") ? 17 : 13,
            hp,
            maxHp: hp,
            atk: Math.round(Number(row.atk) * (1 + 0.1 * m)),
            spd: Number(row.spd) + Math.min(30, 2.5 * m),
            xp: Number(row.xp_reward),
            color: boss ? "#f5d67b" : row.id.includes("bat") ? "#8a5c72" : row.id.includes("wisp") ? "#7ed7c1" : "#604b7a",
            burn: 0,
            boss
          };
        }

        function spawn(row = null, boss = false) {
          const source = row || enemyPool[Math.floor(rand() * Math.min(enemyPool.length, 2 + Math.floor(state.time / 60)))];
          const e = enemyScale(source, boss);
          const edge = Math.floor(rand() * 4);
          e.x = edge === 0 ? -40 : edge === 1 ? canvas.width + 40 : rand() * canvas.width;
          e.y = edge === 2 ? -40 : edge === 3 ? canvas.height + 40 : rand() * canvas.height;
          state.enemies.push(e);
        }

        function nearest(range) {
          let best = null;
          let bestD = range;
          for (const e of state.enemies) {
            const d = distance(state.player, e);
            if (d < bestD) {
              best = e;
              bestD = d;
            }
          }
          return best;
        }

        function damageEnemy(e, amount, burn = false) {
          e.hp -= amount * state.player.damageMult;
          if (burn) e.burn = Math.max(e.burn, 2);
        }

        function fire(w) {
          const ability = abilityById[w.id];
          if (!ability) return;
          const power = Number(ability.power) + (w.level - 1) * 3;
          if (ability.type === "area") {
            state.pulse = 0.18;
            for (const e of state.enemies) if (distance(state.player, e) < 86) damageEnemy(e, power, ability.status_effects.includes("burn"));
            return;
          }
          if (ability.type === "chain") {
            for (const e of state.enemies.filter((e) => distance(state.player, e) < 220).slice(0, 4 + w.level)) damageEnemy(e, power);
            return;
          }
          const target = nearest(280);
          if (!target) return;
          const a = Math.atan2(target.y - state.player.y, target.x - state.player.x);
          state.bullets.push({ x: state.player.x, y: state.player.y, vx: Math.cos(a) * 430, vy: Math.sin(a) * 430, r: 5, life: 1.1, damage: power, burn: ability.status_effects.includes("burn") });
        }

        function gainXP(n) {
          state.player.xp += n;
          if (state.player.xp >= state.player.xpNeed) {
            state.player.xp -= state.player.xpNeed;
            state.player.level += 1;
            state.player.xpNeed = Math.round(state.player.xpNeed * 1.28 + 4);
            const upgrades = ["ability_grave_bell", "ability_widow_spark", hero.starting_abilities];
            const pick = upgrades[(state.player.level + state.kills) % upgrades.length];
            const existing = state.weapons.find((w) => w.id === pick);
            if (existing) existing.level += 1;
            else state.weapons.push({ id: pick, cd: 0, level: 1 });
            state.player.damageMult += 0.04;
            document.querySelector("#gameLog").textContent = `Level ${state.player.level}: upgraded ${abilityById[pick].name}.`;
          }
        }

        function update(dt) {
          state.time += dt;
          const x = (keys.d || keys.ArrowRight ? 1 : 0) - (keys.a || keys.ArrowLeft ? 1 : 0);
          const y = (keys.s || keys.ArrowDown ? 1 : 0) - (keys.w || keys.ArrowUp ? 1 : 0);
          const len = Math.hypot(x, y) || 1;
          state.player.x = clamp(state.player.x + x / len * state.player.spd * dt, 16, canvas.width - 16);
          state.player.y = clamp(state.player.y + y / len * state.player.spd * dt, 16, canvas.height - 16);

          if (state.time > 300 && !state.bossSpawned) {
            state.bossSpawned = true;
            spawn(bossDef, true);
            document.querySelector("#gameLog").textContent = "Bell Ghast has arrived.";
          }

          const spawnRate = 1.2 + 0.55 * (state.time / 60);
          state.spawnBank += spawnRate * dt;
          while (state.spawnBank >= 1 && state.enemies.length < 45 + 18 * (state.time / 60)) {
            spawn();
            state.spawnBank -= 1;
          }

          for (const w of state.weapons) {
            const ability = abilityById[w.id];
            w.cd -= dt;
            if (w.cd <= 0) {
              fire(w);
              w.cd = Number(ability.cooldown) * Math.max(0.62, 1 - (w.level - 1) * 0.06);
            }
          }

          for (const e of state.enemies) {
            const a = Math.atan2(state.player.y - e.y, state.player.x - e.x);
            e.x += Math.cos(a) * e.spd * dt;
            e.y += Math.sin(a) * e.spd * dt;
            if (e.burn > 0) {
              e.burn -= dt;
              e.hp -= 3 * dt;
            }
            if (distance(state.player, e) < state.player.r + e.r) state.player.hp -= e.atk * dt;
          }

          for (const b of state.bullets) {
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            b.life -= dt;
            for (const e of state.enemies) {
              if (b.life > 0 && distance(b, e) < b.r + e.r) {
                damageEnemy(e, b.damage, b.burn);
                b.life = 0;
              }
            }
          }

          state.enemies = state.enemies.filter((e) => {
            if (e.hp > 0) return true;
            state.kills += 1;
            state.pickups.push({ x: e.x, y: e.y, r: 5, value: e.xp });
            if (e.boss) {
              state.over = true;
              document.querySelector("#gameLog").textContent = "Boss defeated. Phase 2 run complete.";
            }
            return false;
          });

          for (const p of state.pickups) {
            if (distance(state.player, p) < state.player.pickupRadius) {
              gainXP(p.value);
              p.dead = true;
            }
          }
          state.pickups = state.pickups.filter((p) => !p.dead);
          state.bullets = state.bullets.filter((b) => b.life > 0);
          state.pulse = Math.max(0, state.pulse - dt);
          if (state.player.hp <= 0) {
            state.over = true;
            document.querySelector("#gameLog").textContent = "Run ended. Press Restart Run.";
          }
        }

        function circle(x, y, r, color) {
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }

        function draw() {
          ctx.fillStyle = "#111018";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.strokeStyle = "rgba(255,255,255,.055)";
          for (let x = -40; x < canvas.width + 80; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x + 80, canvas.height);
            ctx.stroke();
          }
          for (const p of state.pickups) circle(p.x, p.y, p.r, "#6ee7ff");
          for (const b of state.bullets) circle(b.x, b.y, b.r, "#ff9f43");
          for (const e of state.enemies) {
            circle(e.x, e.y, e.r, e.burn > 0 ? "#ff9f43" : e.color);
            if (e.boss) {
              ctx.strokeStyle = "#f5d67b";
              ctx.lineWidth = 3;
              ctx.stroke();
            }
          }
          if (state.pulse > 0) {
            ctx.strokeStyle = "rgba(245,214,123,.7)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(state.player.x, state.player.y, 86, 0, Math.PI * 2);
            ctx.stroke();
          }
          circle(state.player.x, state.player.y, state.player.r, "#f5d67b");
          circle(state.player.x + 5, state.player.y - 3, 4, "#e86f68");
        }

        function updateHud() {
          const t = Math.floor(state.time);
          document.querySelector("#gameHp").textContent = `HP ${Math.max(0, Math.ceil(state.player.hp))}/${state.player.maxHp}`;
          document.querySelector("#gameTimer").textContent = `${String(Math.floor(t / 60)).padStart(2, "0")}:${String(t % 60).padStart(2, "0")}`;
          document.querySelector("#gameStats").textContent = `Lv ${state.player.level} | ${state.kills} kills`;
        }

        function frame(now) {
          if (game !== state) return;
          const dt = Math.min(0.033, (now - state.last) / 1000 || 0);
          state.last = now;
          if (!state.over) update(dt);
          draw();
          updateHud();
          requestAnimationFrame(frame);
        }

        window.onkeydown = (e) => { keys[e.key] = true; };
        window.onkeyup = (e) => { keys[e.key] = false; };
        document.querySelector("#restartGame").onclick = () => startGame();
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas, { once: true });
        game = state;
        requestAnimationFrame(frame);
      }

      function render() {
        document.querySelector("#viewTitle").textContent = labels[current];
        document.querySelectorAll("nav button").forEach((button) => button.classList.toggle("active", button.dataset.view === current));
        document.querySelector("#search").style.display = data[current] ? "" : "none";
        if (current === "play") renderPlay();
        else if (current === "checklist") renderChecklist();
        else if (current === "guide") renderGuide();
        else renderCards(data[current]);
      }

      const nav = document.querySelector("#nav");
      ["play", ...Object.keys(data), "checklist", "guide"].forEach((view) => {
        const button = document.createElement("button");
        button.textContent = labels[view];
        button.dataset.view = view;
        button.addEventListener("click", () => {
          current = view;
          render();
        });
        nav.appendChild(button);
      });

      document.querySelector("#search").addEventListener("input", render);
      render();
    </script>
  </body>
</html>
